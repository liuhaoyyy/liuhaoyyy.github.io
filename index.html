<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的云端 Python 沙盒</title>
    <!-- 引入 Tailwind CSS 让网页看起来更现代 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 给网页加上动态流光背景，与你的沙盒风格呼应 */
        body {
            background: linear-gradient(-45deg, #f3e7e9, #e3eeff, #e0c3fc, #8ec5fc);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .iframe-container {
            height: calc(100vh - 120px);
            min-height: 700px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-8 px-4 font-sans text-gray-800">

    <!-- 网页头部标识 -->
    <header class="text-center mb-6">
        <h1 class="text-3xl md:text-4xl font-extrabold text-slate-800 tracking-tight drop-shadow-sm">
            🚀 欢迎来到我的 Python 实验室
        </h1>
        <p class="mt-2 text-slate-600 font-medium">
            前端由 <span class="text-blue-600 font-bold">GitHub Pages</span> 极速托管 | 算力由 <span class="text-orange-500 font-bold">Hugging Face</span> 免费驱动
        </p>
    </header>

    <!-- 核心：嵌入应用的玻璃拟态容器 -->
    <main class="w-full max-w-7xl bg-white/60 backdrop-blur-xl border border-white/40 rounded-3xl shadow-2xl overflow-hidden iframe-container flex flex-col">
        
        <!-- Mac 风格的窗口控制条 (纯装饰) -->
        <div class="h-10 bg-slate-100/50 border-b border-gray-200/50 flex items-center px-4 gap-2">
            <div class="w-3.5 h-3.5 rounded-full bg-red-400 shadow-sm"></div>
            <div class="w-3.5 h-3.5 rounded-full bg-yellow-400 shadow-sm"></div>
            <div class="w-3.5 h-3.5 rounded-full bg-green-400 shadow-sm"></div>
            <div class="ml-4 text-xs text-gray-400 font-mono">Gradio Engine - Running</div>
        </div>

        <!-- ⚠️ 注意：请将下面 src 里面的链接替换为你自己的 Hugging Face Space 直链 -->
        <iframe
            src="https://liuhaoyyy-web.hf.space" 
            id="gradio-app"
            frameborder="0"
            class="w-full h-full flex-grow"
            allow="accelerometer; ambient-light-sensor; autoplay; battery; camera; document-domain; encrypted-media; fullscreen; geolocation; gyroscope; layout-animations; legacy-image-formats; magnetometer; microphone; midi; oversized-images; payment; picture-in-picture; publickey-credentials-get; sync-xhr; usb; vr; wake-lock; xr-spatial-tracking"
        ></iframe>
    </main>

    <footer class="mt-8 text-sm text-slate-500">
        &copy; 2024 Python Web IDE. All rights reserved.
    </footer>

</body>
</html>
